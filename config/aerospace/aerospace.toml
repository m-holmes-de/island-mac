# Island-mac AeroSpace config
# https://nikitabobko.github.io/AeroSpace/guide
#
# Modifier scheme: the Hyperkey app maps Caps Lock -> Hyper = Cmd+Ctrl+Alt.
# In this file that chord is written `cmd-ctrl-alt`. Adding `shift` gives the
# "move" variants. Because Hyper is the full three-modifier chord, a plain
# Option+key (e.g. Option+L = @) is a different keystroke and is left untouched.

# Start AeroSpace at login.
start-at-login = true

# Normalizations (recommended defaults).
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Center the mouse on the newly focused monitor.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
# AeroSpace binds to physical key positions, not the active macOS layout's
# characters. German QWERTZ shares every letter/number position with US-QWERTY
# except Z<->Y. All bindings in this file use keys that sit in identical
# positions on a DE board, so they match the printed labels. We start from the
# qwerty preset and swap Z/Y below so those two notations also match DE labels.
preset = 'qwerty'

[key-mapping.key-notation-to-key-code]
z = 'y'   # DE 'Z' key sits where US-QWERTY has 'Y'
y = 'z'   # DE 'Y' key sits where US-QWERTY has 'Z'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# --- Window rules ---
# Shottr's screenshot/annotation window must stay visible and on top after a
# capture. Float it so the tiler never pushes it behind other windows.
# (AeroSpace can't auto-center floating windows; Shottr controls its position.)
[[on-window-detected]]
if.app-id = 'cc.ffitch.shottr'
run = ['layout floating']

[mode.main.binding]

# --- Layout & window actions (mnemonic letters) ---
cmd-ctrl-alt-t = 'layout tiles horizontal vertical'       # T = Tiling
cmd-ctrl-alt-a = 'layout accordion horizontal vertical'   # A = Accordion
cmd-ctrl-alt-m = 'fullscreen'                             # M = Maximize (fullscreen)
cmd-ctrl-alt-f = 'layout floating tiling'                 # F = Float (toggle floating / tiling)

# --- Focus (Hyper + h/j/k/l) ---
cmd-ctrl-alt-h = 'focus left'
cmd-ctrl-alt-j = 'focus down'
cmd-ctrl-alt-k = 'focus up'
cmd-ctrl-alt-l = 'focus right'

# --- Move window within layout (Hyper + Shift + h/j/k/l) ---
cmd-ctrl-alt-shift-h = 'move left'
cmd-ctrl-alt-shift-j = 'move down'
cmd-ctrl-alt-shift-k = 'move up'
cmd-ctrl-alt-shift-l = 'move right'

# --- Resize ---
cmd-ctrl-alt-s = 'resize smart -50'   # S = Shrink
cmd-ctrl-alt-d = 'resize smart +50'   # D = grow (bigger)

# --- Switch workspace / desktop (Hyper + number) ---
cmd-ctrl-alt-1 = 'workspace 1'
cmd-ctrl-alt-2 = 'workspace 2'
cmd-ctrl-alt-3 = 'workspace 3'
cmd-ctrl-alt-4 = 'workspace 4'
cmd-ctrl-alt-5 = 'workspace 5'
cmd-ctrl-alt-6 = 'workspace 6'
cmd-ctrl-alt-7 = 'workspace 7'
cmd-ctrl-alt-8 = 'workspace 8'
cmd-ctrl-alt-9 = 'workspace 9'

# --- Move focused window to workspace (Hyper + Shift + number) ---
cmd-ctrl-alt-shift-1 = 'move-node-to-workspace 1'
cmd-ctrl-alt-shift-2 = 'move-node-to-workspace 2'
cmd-ctrl-alt-shift-3 = 'move-node-to-workspace 3'
cmd-ctrl-alt-shift-4 = 'move-node-to-workspace 4'
cmd-ctrl-alt-shift-5 = 'move-node-to-workspace 5'
cmd-ctrl-alt-shift-6 = 'move-node-to-workspace 6'
cmd-ctrl-alt-shift-7 = 'move-node-to-workspace 7'
cmd-ctrl-alt-shift-8 = 'move-node-to-workspace 8'
cmd-ctrl-alt-shift-9 = 'move-node-to-workspace 9'

# --- Workspace navigation ---
cmd-ctrl-alt-tab = 'workspace-back-and-forth'
cmd-ctrl-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Enter service mode (reload config, reset layout, etc.) ---
cmd-ctrl-alt-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']   # reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

cmd-ctrl-alt-shift-h = ['join-with left', 'mode main']
cmd-ctrl-alt-shift-j = ['join-with down', 'mode main']
cmd-ctrl-alt-shift-k = ['join-with up', 'mode main']
cmd-ctrl-alt-shift-l = ['join-with right', 'mode main']
